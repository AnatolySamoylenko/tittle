services:
  - type: web
    name: tittle_restart
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: tittle-reset-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: tittle-reset-db
    plan: free