services:
  - type: web
    name: tittle_restart
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 600 --workers 2 --threads 2 --max-requests 1000 --max-requests-jitter 100
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: tittle_restart_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GUNICORN_TIMEOUT
        value: 600
      - key: GUNICORN_WORKERS
        value: 2
      - key: GUNICORN_THREADS
        value: 2
      - key: SCHEDULED_TASK_ENABLED
        value: "true"
      - key: SCHEDULED_TASK_MINUTE
        value: "50"
      - key: TIMEZONE
        value: "Europe/Moscow"

  # Cron-задача для синхронизации рекламных кампаний
  # Запускается в 50 минут каждого часа
  - type: cron
    name: tittle_restart_50
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python scheduler_50.py  # Изменено с scheduler.py
    schedule: "50 * * * *"  # Запуск в 50 минут каждого часа (UTC)
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: tittle_restart_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CRONJOB_MODE
        value: "true"
      - key: TIMEZONE
        value: "Europe/Moscow"
      - key: TASK_NAME
        value: "tittle_restart_50"

databases:
  - name: tittle_restart_db
    plan: free